# ═══════════════════════════════════════════════════════════
# PersistentVolumeClaims
# ═══════════════════════════════════════════════════════════

# ── MSSQL data ───────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql-data-pvc
  labels:
    app: mssql
    app.kubernetes.io/part-of: caisseflow
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-premium
  resources:
    requests:
      storage: 50Gi
---
