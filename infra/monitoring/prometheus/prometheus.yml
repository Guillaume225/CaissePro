global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: caisseflow
    environment: production

# ── Alert rules ───────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts/*.yml

# ── Alertmanager ──────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Scrape configs ────────────────────────────────────────
scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Node services (NestJS) ─────────────────────────────
  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:3001"]
        labels:
          service: auth-service
          language: node

  - job_name: expense-service
    metrics_path: /metrics
    static_configs:
      - targets: ["expense-service:3002"]
        labels:
          service: expense-service
          language: node

  - job_name: sales-service
    metrics_path: /metrics
    static_configs:
      - targets: ["sales-service:3003"]
        labels:
          service: sales-service
          language: node

  - job_name: audit-service
    metrics_path: /metrics
    static_configs:
      - targets: ["audit-service:3004"]
        labels:
          service: audit-service
          language: node

  - job_name: file-service
    metrics_path: /metrics
    static_configs:
      - targets: ["file-service:3005"]
        labels:
          service: file-service
          language: node

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:3006"]
        labels:
          service: notification-service
          language: node

  # ── Python services ────────────────────────────────────
  - job_name: ai-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-service:8000"]
        labels:
          service: ai-service
          language: python

  - job_name: report-service
    metrics_path: /metrics
    static_configs:
      - targets: ["report-service:8001"]
        labels:
          service: report-service
          language: python

  # ── Infrastructure ─────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]
        labels:
          service: minio

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          service: rabbitmq

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Kubernetes service discovery ───────────────────────
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app
