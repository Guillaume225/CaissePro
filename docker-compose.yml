version: "3.9"

services:
  # SQL Server is expected to run locally (sa / Toi&MoiSaFait1)
  # No Docker container needed for the database.

  redis:
    image: redis:7-alpine
    container_name: caisseflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    container_name: caisseflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-caisseflow}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-caisseflow-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
