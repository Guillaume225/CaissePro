version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: caisseflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caisseflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caisseflow}
      POSTGRES_DB: ${POSTGRES_DB:-caisseflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: caisseflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
