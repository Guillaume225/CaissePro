name: CD — Production

on:
  push:
    tags: ['v*']

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/caisseflow
  K8S_NAMESPACE: caisseflow-prod

permissions:
  contents: read
  packages: write

jobs:
  # ── Build & push tagged images ────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - service: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - service: expense-service
            context: .
            dockerfile: services/expense-service/Dockerfile
          - service: sales-service
            context: .
            dockerfile: services/sales-service/Dockerfile
          - service: audit-service
            context: .
            dockerfile: services/audit-service/Dockerfile
          - service: file-service
            context: .
            dockerfile: services/file-service/Dockerfile
          - service: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile
          - service: ai-service
            context: services/ai-service
            dockerfile: services/ai-service/Dockerfile
          - service: report-service
            context: services/report-service
            dockerfile: services/report-service/Dockerfile
          - service: api-gateway
            context: apps/api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Blue-green deployment ─────────────────────────────
  deploy-production:
    name: Deploy to Production (Blue-Green)
    runs-on: windows-latest
    needs: build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        shell: pwsh
        run: |
          $kubeDir = "$env:USERPROFILE\.kube"
          if (-not (Test-Path $kubeDir)) { New-Item -ItemType Directory -Path $kubeDir -Force }
          [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("${{ secrets.KUBE_CONFIG_PROD }}")) | Out-File "$kubeDir\config" -Encoding utf8

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref }}" -replace '^refs/tags/v', ''
          "tag=$tag" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Determine active slot
        id: slot
        shell: pwsh
        run: |
          $active = kubectl get svc web -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.selector.slot}' 2>$null
          if (-not $active -or $LASTEXITCODE -ne 0) { $active = "blue" }
          if ($active -eq "blue") {
            "target=green" | Out-File -Append $env:GITHUB_OUTPUT
            "current=blue" | Out-File -Append $env:GITHUB_OUTPUT
          } else {
            "target=blue" | Out-File -Append $env:GITHUB_OUTPUT
            "current=green" | Out-File -Append $env:GITHUB_OUTPUT
          }
          $targetSlot = if ($active -eq "blue") { "green" } else { "blue" }
          Write-Host "Active slot: $active -> deploying to $targetSlot"

      - name: Deploy to ${{ steps.slot.outputs.target }} slot
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.tag }}"
          $slot = "${{ steps.slot.outputs.target }}"
          $services = @("auth-service","expense-service","sales-service","audit-service","file-service","notification-service","ai-service","report-service","api-gateway","web")
          foreach ($svc in $services) {
            $deployName = "${svc}-${slot}"
            $image = "${{ env.IMAGE_PREFIX }}/${svc}:${version}"
            kubectl set image deployment/$deployName "${svc}=${image}" -n ${{ env.K8S_NAMESPACE }} --record 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "No blue-green deployment for $svc, updating main deployment"
              kubectl set image deployment/$svc "${svc}=${image}" -n ${{ env.K8S_NAMESPACE }} --record 2>$null
            }
          }

      - name: Wait for ${{ steps.slot.outputs.target }} rollout
        shell: pwsh
        run: |
          $slot = "${{ steps.slot.outputs.target }}"
          $services = @("auth-service","expense-service","sales-service","audit-service","file-service","notification-service","ai-service","report-service","web")
          foreach ($svc in $services) {
            kubectl rollout status deployment/"${svc}-${slot}" -n ${{ env.K8S_NAMESPACE }} --timeout=300s 2>$null
            if ($LASTEXITCODE -ne 0) {
              kubectl rollout status deployment/$svc -n ${{ env.K8S_NAMESPACE }} --timeout=300s 2>$null
            }
          }

      - name: Smoke tests
        id: smoke
        shell: pwsh
        run: |
          $prodUrl = "${{ secrets.PRODUCTION_URL }}"
          $endpoints = @("/api/health", "/api/auth/health", "/api/expenses/health")
          $failed = 0
          foreach ($ep in $endpoints) {
            Write-Host "Testing ${prodUrl}${ep}..."
            $ok = $false
            for ($i = 1; $i -le 5; $i++) {
              try {
                $resp = Invoke-WebRequest -Uri "${prodUrl}${ep}" -UseBasicParsing -TimeoutSec 10
                if ($resp.StatusCode -eq 200) {
                  Write-Host "  OK - ${ep}"
                  $ok = $true
                  break
                }
              } catch { }
              if ($i -eq 5) {
                Write-Host "  FAILED - ${ep}"
                $failed = 1
              }
              Start-Sleep -Seconds 5
            }
          }
          if ($failed -eq 1) {
            "smoke_passed=false" | Out-File -Append $env:GITHUB_OUTPUT
            exit 1
          }
          "smoke_passed=true" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Switch traffic to ${{ steps.slot.outputs.target }}
        if: steps.smoke.outputs.smoke_passed == 'true'
        shell: pwsh
        run: |
          $slot = "${{ steps.slot.outputs.target }}"
          kubectl patch svc web -n ${{ env.K8S_NAMESPACE }} -p "{`"spec`":{`"selector`":{`"slot`":`"${slot}`"}}}" 2>$null
          kubectl patch svc api-gateway -n ${{ env.K8S_NAMESPACE }} -p "{`"spec`":{`"selector`":{`"slot`":`"${slot}`"}}}" 2>$null
          Write-Host "Traffic switched to $slot"

      - name: Rollback on failure
        if: failure() && steps.smoke.outputs.smoke_passed == 'false'
        shell: pwsh
        run: |
          $current = "${{ steps.slot.outputs.current }}"
          $target = "${{ steps.slot.outputs.target }}"
          Write-Host "Rolling back - keeping traffic on $current slot"
          $services = @("auth-service","expense-service","sales-service","audit-service","file-service","notification-service","ai-service","report-service","web")
          foreach ($svc in $services) {
            kubectl rollout undo deployment/"${svc}-${target}" -n ${{ env.K8S_NAMESPACE }} 2>$null
          }
          Write-Host "::error::Deployment failed smoke tests. Traffic remains on $current slot."

  # ── Post-deploy notification ──────────────────────────
  notify:
    name: Notify
    runs-on: windows-latest
    needs: deploy-production
    if: always()
    steps:
      - name: Notify result
        shell: pwsh
        run: |
          if ("${{ needs.deploy-production.result }}" -eq "success") {
            Write-Host "Production deployment ${{ github.ref_name }} successful"
          } else {
            Write-Host "Production deployment ${{ github.ref_name }} failed - rolled back"
          }
