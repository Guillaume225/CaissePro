name: CD — Production

on:
  push:
    tags: ["v*"]

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/caisseflow
  K8S_NAMESPACE: caisseflow-prod

permissions:
  contents: read
  packages: write

jobs:
  # ── Build & push tagged images ────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - service: expense-service
            context: .
            dockerfile: services/expense-service/Dockerfile
          - service: sales-service
            context: .
            dockerfile: services/sales-service/Dockerfile
          - service: audit-service
            context: .
            dockerfile: services/audit-service/Dockerfile
          - service: file-service
            context: .
            dockerfile: services/file-service/Dockerfile
          - service: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile
          - service: ai-service
            context: services/ai-service
            dockerfile: services/ai-service/Dockerfile
          - service: report-service
            context: services/report-service
            dockerfile: services/report-service/Dockerfile
          - service: api-gateway
            context: apps/api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Blue-green deployment ─────────────────────────────
  deploy-production:
    name: Deploy to Production (Blue-Green)
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Determine active slot
        id: slot
        run: |
          ACTIVE=$(kubectl get svc web -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.selector.slot}' 2>/dev/null || echo "blue")
          if [ "$ACTIVE" = "blue" ]; then
            echo "target=green" >> $GITHUB_OUTPUT
            echo "current=blue" >> $GITHUB_OUTPUT
          else
            echo "target=blue" >> $GITHUB_OUTPUT
            echo "current=green" >> $GITHUB_OUTPUT
          fi
          echo "Active slot: $ACTIVE → deploying to $([ "$ACTIVE" = "blue" ] && echo green || echo blue)"

      - name: Deploy to ${{ steps.slot.outputs.target }} slot
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          SLOT="${{ steps.slot.outputs.target }}"
          SERVICES=(auth-service expense-service sales-service audit-service file-service notification-service ai-service report-service api-gateway web)

          for SVC in "${SERVICES[@]}"; do
            # Update the inactive deployment
            DEPLOY_NAME="${SVC}-${SLOT}"
            IMAGE="${{ env.IMAGE_PREFIX }}/${SVC}:${VERSION}"

            kubectl set image deployment/${DEPLOY_NAME} \
              ${SVC}=${IMAGE} \
              -n ${{ env.K8S_NAMESPACE }} \
              --record 2>/dev/null || \
            echo "No blue-green deployment for ${SVC}, updating main deployment" && \
            kubectl set image deployment/${SVC} \
              ${SVC}=${IMAGE} \
              -n ${{ env.K8S_NAMESPACE }} \
              --record || true
          done

      - name: Wait for ${{ steps.slot.outputs.target }} rollout
        run: |
          SLOT="${{ steps.slot.outputs.target }}"
          SERVICES=(auth-service expense-service sales-service audit-service file-service notification-service ai-service report-service web)
          for SVC in "${SERVICES[@]}"; do
            kubectl rollout status deployment/${SVC}-${SLOT} \
              -n ${{ env.K8S_NAMESPACE }} \
              --timeout=300s 2>/dev/null || \
            kubectl rollout status deployment/${SVC} \
              -n ${{ env.K8S_NAMESPACE }} \
              --timeout=300s || true
          done

      - name: Smoke tests
        id: smoke
        run: |
          PROD_URL="${{ secrets.PRODUCTION_URL }}"
          ENDPOINTS=("/api/health" "/api/auth/health" "/api/expenses/health")
          FAILED=0

          for EP in "${ENDPOINTS[@]}"; do
            echo "Testing ${PROD_URL}${EP}..."
            for i in {1..5}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}${EP}" --max-time 10 || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "  ✓ ${EP} — OK"
                break
              fi
              if [ "$i" = "5" ]; then
                echo "  ✗ ${EP} — FAILED (status: ${STATUS})"
                FAILED=1
              fi
              sleep 5
            done
          done

          if [ "$FAILED" = "1" ]; then
            echo "smoke_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "smoke_passed=true" >> $GITHUB_OUTPUT

      - name: Switch traffic to ${{ steps.slot.outputs.target }}
        if: steps.smoke.outputs.smoke_passed == 'true'
        run: |
          SLOT="${{ steps.slot.outputs.target }}"
          # Patch all services to point to the new slot
          kubectl patch svc web -n ${{ env.K8S_NAMESPACE }} \
            -p "{\"spec\":{\"selector\":{\"slot\":\"${SLOT}\"}}}" || true
          kubectl patch svc api-gateway -n ${{ env.K8S_NAMESPACE }} \
            -p "{\"spec\":{\"selector\":{\"slot\":\"${SLOT}\"}}}" || true
          echo "Traffic switched to ${SLOT}"

      - name: Rollback on failure
        if: failure() && steps.smoke.outputs.smoke_passed == 'false'
        run: |
          CURRENT="${{ steps.slot.outputs.current }}"
          echo "Rolling back — keeping traffic on ${CURRENT} slot"
          SERVICES=(auth-service expense-service sales-service audit-service file-service notification-service ai-service report-service web)
          for SVC in "${SERVICES[@]}"; do
            kubectl rollout undo deployment/${SVC}-${{ steps.slot.outputs.target }} \
              -n ${{ env.K8S_NAMESPACE }} 2>/dev/null || true
          done
          echo "::error::Deployment failed smoke tests. Traffic remains on ${CURRENT} slot."

  # ── Post-deploy notification ──────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()
    steps:
      - name: Notify result
        run: |
          if [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "✅ Production deployment ${{ github.ref_name }} successful"
          else
            echo "❌ Production deployment ${{ github.ref_name }} failed — rolled back"
          fi
