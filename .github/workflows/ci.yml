name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'
  PYTHON_VERSION: '3.12'

jobs:
  # ── Lint & Format ─────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pnpm install --frozen-lockfile

      - name: Install ruff
        run: pip install ruff

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format

  # ── Unit Tests (Node services) ────────────────────────
  test-node:
    name: Unit Tests (Node)
    runs-on: windows-latest
    needs: lint
    strategy:
      matrix:
        service:
          - auth-service
          - expense-service
          - sales-service
          - audit-service
          - file-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests — ${{ matrix.service }}
        run: pnpm --filter @caisseflow/${{ matrix.service }} test -- --ci --coverage
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/
          retention-days: 7

  # ── Unit Tests (Shared packages) ──────────────────────
  test-packages:
    name: Unit Tests (Packages)
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Test shared-utils
        run: pnpm --filter @caisseflow/shared-utils test -- --ci --coverage

  # ── Unit Tests (Python services) ──────────────────────
  test-python:
    name: Unit Tests (Python)
    runs-on: windows-latest
    needs: lint
    strategy:
      matrix:
        service: [ai-service, report-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        shell: pwsh
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov pytest-asyncio

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest tests/ -v --cov=app --cov-report=xml
        env:
          ENVIRONMENT: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          retention-days: 7

  # ── Integration Tests ─────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: windows-latest
    needs: [test-node, test-python]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start SQL Server
        shell: pwsh
        run: |
          # SQL Server is pre-installed on windows-latest runners
          # Configure and start it for tests
          $sqlInstance = (Get-Service -Name 'MSSQLSERVER' -ErrorAction SilentlyContinue) ??
                        (Get-Service -Name 'MSSQL$SQLEXPRESS' -ErrorAction SilentlyContinue)
          if ($sqlInstance) {
            Start-Service $sqlInstance.Name -ErrorAction SilentlyContinue
          }
          # Create test database via sqlcmd
          sqlcmd -S localhost -E -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'caisseflow_test') CREATE DATABASE caisseflow_test"

      - name: Run e2e tests
        shell: pwsh
        run: |
          pnpm --filter @caisseflow/auth-service test:e2e; $true
          pnpm --filter @caisseflow/expense-service test:e2e; $true
          pnpm --filter @caisseflow/sales-service test:e2e; $true
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: '1433'
          DB_USERNAME: sa
          DB_PASSWORD: 'TestPassword123!'
          DB_DATABASE: caisseflow_test

  # ── Build check (TypeScript compilation) ──────────────
  build:
    name: Build Check
    runs-on: windows-latest
    needs: lint
    strategy:
      matrix:
        service:
          - auth-service
          - expense-service
          - sales-service
          - audit-service
          - file-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.service }}
        run: pnpm --filter @caisseflow/${{ matrix.service }} build
        continue-on-error: true

  # ── Security scan ─────────────────────────────────────
  security:
    name: Security Scan
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pnpm install --frozen-lockfile

      - name: npm audit (Node)
        shell: pwsh
        run: pnpm audit --audit-level=high; $true

      - name: pip audit (Python services)
        shell: pwsh
        run: |
          pip install pip-audit
          pip-audit -r services/ai-service/requirements.txt; $true
          pip-audit -r services/report-service/requirements.txt; $true
