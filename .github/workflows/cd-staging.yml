name: CD — Staging

on:
  push:
    branches: [develop]

concurrency:
  group: cd-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/caisseflow
  K8S_NAMESPACE: caisseflow-staging

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - service: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - service: expense-service
            context: .
            dockerfile: services/expense-service/Dockerfile
          - service: sales-service
            context: .
            dockerfile: services/sales-service/Dockerfile
          - service: audit-service
            context: .
            dockerfile: services/audit-service/Dockerfile
          - service: file-service
            context: .
            dockerfile: services/file-service/Dockerfile
          - service: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile
          - service: ai-service
            context: services/ai-service
            dockerfile: services/ai-service/Dockerfile
          - service: report-service
            context: services/report-service
            dockerfile: services/report-service/Dockerfile
          - service: api-gateway
            context: apps/api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: windows-latest
    needs: build-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        shell: pwsh
        run: |
          $kubeDir = "$env:USERPROFILE\.kube"
          if (-not (Test-Path $kubeDir)) { New-Item -ItemType Directory -Path $kubeDir -Force }
          [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("${{ secrets.KUBE_CONFIG_STAGING }}")) | Out-File "$kubeDir\config" -Encoding utf8

      - name: Update image tags
        shell: pwsh
        run: |
          $shaShort = "${{ github.sha }}".Substring(0, 7)
          $services = @("auth-service","expense-service","sales-service","audit-service","file-service","notification-service","ai-service","report-service","api-gateway","web")
          foreach ($svc in $services) {
            kubectl set image deployment/$svc `
              "${svc}=${{ env.IMAGE_PREFIX }}/${svc}:staging-sha-${shaShort}" `
              -n ${{ env.K8S_NAMESPACE }} --record 2>$null
            if ($LASTEXITCODE -ne 0) { Write-Host "Skipping $svc (not found)" }
          }

      - name: Wait for rollout
        shell: pwsh
        run: |
          $services = @("auth-service","expense-service","sales-service","audit-service","file-service","notification-service","ai-service","report-service","web")
          foreach ($svc in $services) {
            kubectl rollout status deployment/$svc -n ${{ env.K8S_NAMESPACE }} --timeout=300s 2>$null
            if ($LASTEXITCODE -ne 0) { Write-Host "Warning: $svc rollout not ready" }
          }

      - name: Smoke test
        shell: pwsh
        run: |
          $stagingUrl = "${{ secrets.STAGING_URL }}"
          Write-Host "Checking ${stagingUrl}/api/health..."
          $passed = $false
          for ($i = 1; $i -le 10; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "${stagingUrl}/api/health" -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check passed!"
                $passed = $true
                break
              }
            } catch {
              Write-Host "Attempt ${i}: failed, retrying in 10s..."
            }
            Start-Sleep -Seconds 10
          }
          if (-not $passed) {
            Write-Host "Smoke test failed"
            exit 1
          }
